name: Update LINE User ID

on:
  workflow_dispatch:
    inputs:
      old_id:
        description: '舊的 LINE User ID'
        required: true
      new_id:
        description: '新的 LINE User ID'
        required: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install supabase

      - name: Update User
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          OLD_ID: ${{ github.event.inputs.old_id }}
          NEW_ID: ${{ github.event.inputs.new_id }}
        run: python scripts/update_line_id.py