name: Fubon P&L Daily Report Bot

on:
  schedule:
    - cron: '35 6 * * 1-5'
  workflow_dispatch:

jobs:
  run-pnl-report:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: pip

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Download & Install Fubon Neo SDK
      run: |
        curl -L -o fubon_neo.zip "https://www.fbs.com.tw/TradeAPI_SDK/fubon_binary/fubon_neo-2.2.8-cp37-abi3-manylinux_2_17_x86_64.manylinux2014_x86_64.zip"
        unzip -o fubon_neo.zip
        pip install fubon_neo-*.whl
        rm -f fubon_neo.zip fubon_neo-*.whl

    - name: Run P&L Bot
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        MASTER_KEY: ${{ secrets.MASTER_KEY }}
        LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
      run: |
        python -m src.main
