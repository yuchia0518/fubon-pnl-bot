name: Fubon P&L Daily Report Bot

on:
  schedule:
    - cron: '35 6 * * 1-5'
  workflow_dispatch:

jobs:
  run-pnl-report:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Download & Install Fubon Neo SDK
      shell: bash
      run: |
        set -e
        echo "下載 Fubon Neo SDK..."
        curl -f -L -o fubon_neo.zip "https://www.fbs.com.tw/TradeAPI_SDK/fubon_binary/fubon_neo-2.2.8-cp37-abi3-manylinux_2_17_x86_64.manylinux2014_x86_64.zip"
        echo "解壓縮..."
        unzip -o fubon_neo.zip
        echo "解壓後的檔案:"
        ls -la *.whl 2>/dev/null || echo "找不到 .whl 檔案"
        WHL_FILE=$(ls fubon_neo-*.whl | head -1)
        if [ -n "$WHL_FILE" ]; then
          echo "安裝 $WHL_FILE ..."
          pip install "$WHL_FILE"
          echo "✅ Fubon Neo SDK 安裝完成"
        else
          echo "❌ 找不到 .whl 檔案"
          exit 1
        fi
        rm -f fubon_neo.zip fubon_neo-*.whl

    - name: Run P&L Bot
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        MASTER_KEY: ${{ secrets.MASTER_KEY }}
        LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        python -m src.main
