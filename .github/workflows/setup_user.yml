name: Setup User in Supabase

on:
  workflow_dispatch:
    inputs:
      name:
        description: '親友稱呼 (如: 小明)'
        required: true
      line_user_id:
        description: 'LINE User ID'
        required: true
      fubon_username:
        description: '富邦身分證字號'
        required: true
      fubon_password:
        description: '富邦密碼'
        required: true
      fubon_ca_password:
        description: 'CA 憑證密碼 (預設為身分證字號)'
        required: true
      fubon_ca_content:
        description: 'CA 憑證 Base64 內容'
        required: true

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install cryptography supabase python-dotenv

      - name: Encrypt and Insert
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          MASTER_KEY: ${{ secrets.MASTER_KEY }}
          NAME: ${{ github.event.inputs.name }}
          LINE_USER_ID: ${{ github.event.inputs.line_user_id }}
          FUBON_USERNAME: ${{ github.event.inputs.fubon_username }}
          FUBON_PASSWORD: ${{ github.event.inputs.fubon_password }}
          FUBON_CA_PASSWORD: ${{ github.event.inputs.fubon_ca_password }}
          FUBON_CA_CONTENT: ${{ github.event.inputs.fubon_ca_content }}
        run: |
          python -c "
import os, json
from supabase import create_client
from src.crypto_utils import encrypt

supabase = create_client(os.environ['SUPABASE_URL'], os.environ['SUPABASE_KEY'])
mk = os.environ['MASTER_KEY']

data = {
    'name': os.environ['NAME'],
    'line_user_id': os.environ['LINE_USER_ID'],
    'fubon_username': encrypt(os.environ['FUBON_USERNAME'], mk),
    'fubon_password': encrypt(os.environ['FUBON_PASSWORD'], mk),
    'fubon_ca_content': encrypt(os.environ['FUBON_CA_CONTENT'], mk),
    'fubon_ca_password': encrypt(os.environ['FUBON_CA_PASSWORD'], mk),
    'ct_id': 'setup_bot',
}

result = supabase.table('users').insert(data).execute()
print('✅ 已成功寫入使用者:', result.data)
"
